name: e2e
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  playwright:
    runs-on: railway-ci
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: 'true'
          # Hub boots cleanly without upstream env vars; specs mock everything
          # through page.route() so we don't need DNA_API_BASE et al here.
          NODE_ENV: development
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload Playwright traces + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 14
