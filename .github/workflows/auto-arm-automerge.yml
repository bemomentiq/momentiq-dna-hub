# AUTO-GENERATED — self-contained auto-arm (no cross-repo reusable). Arms rebase
# auto-merge on new non-draft PRs targeting main. Runs on the live pool-primary pool.
name: Auto-arm auto-merge
on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]
permissions:
  contents: write
  pull-requests: write
jobs:
  arm:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main' }}
    runs-on: [self-hosted, pool-primary]
    timeout-minutes: 10
    steps:
      - name: Arm rebase auto-merge (squash fallback)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          gh pr merge "$PR" --repo "$REPO" --auto --rebase || gh pr merge "$PR" --repo "$REPO" --auto --squash
