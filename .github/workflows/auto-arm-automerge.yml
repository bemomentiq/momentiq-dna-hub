# AUTO-GENERATED by scripts/cao/rollout-fleet-ci-hardening.mjs — do not edit by hand.
# Self-contained: IDEMPOTENTLY arms rebase auto-merge (squash fallback) on new non-draft PRs
# targeting 'main'. Runs on the self-hosted pool-primary pool (ubuntu-latest is
# Actions-budget-blocked org-wide → it would fail at startup). pull_request_target so it arms
# even when the head branch omits this file. SAFE: never checks out/executes PR head code —
# only calls gh pr view/merge --auto.
name: Auto-arm auto-merge
on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]
permissions:
  contents: write
  pull-requests: write
jobs:
  arm:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main' }}
    runs-on: ${{ fromJSON('["self-hosted", "pool-primary"]') }}
    timeout-minutes: 10
    steps:
      - name: Arm rebase auto-merge (idempotent; squash fallback)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Idempotent: if auto-merge is already enabled (any method), this is a no-op success.
          # Re-arming an already-armed PR makes `gh pr merge --auto` exit non-zero, which used
          # to turn this non-required check red on essentially every PR (the squash fallback
          # failed the same way). Check state first; only arm when nothing is set.
          armed() { gh pr view "$PR" --repo "$REPO" --json autoMergeRequest --jq '.autoMergeRequest.mergeMethod // ""' 2>/dev/null; }
          current="$(armed)"
          if [ -n "$current" ]; then
            echo "auto-merge already armed (method=$current) — nothing to do"
            exit 0
          fi
          # Not armed yet: prefer rebase; fall back to squash only if rebase arming fails.
          if gh pr merge "$PR" --repo "$REPO" --auto --rebase; then
            echo "armed rebase auto-merge"
            exit 0
          fi
          if gh pr merge "$PR" --repo "$REPO" --auto --squash; then
            echo "armed squash auto-merge"
            exit 0
          fi
          # Both attempts failed — re-check in case a concurrent run armed it first.
          current="$(armed)"
          if [ -n "$current" ]; then
            echo "auto-merge armed concurrently (method=$current) — ok"
            exit 0
          fi
          # Genuinely could not arm (PR already merged, or repo disallows auto-merge). Fail-soft:
          # the 180s pr-babysitter poll cron is the backstop, so never red this non-required check.
          echo "::warning::could not arm auto-merge for PR #$PR — poll cron will heal"
          exit 0
