# AUTO-GENERATED by scripts/cao/rollout-fleet-ci-hardening.mjs — do not edit by hand.
# Self-contained: arms rebase auto-merge (squash fallback) on new non-draft PRs targeting
# 'main'. ubuntu-latest keeps this ~10s arm reliable; heavy CI runs on self-hosted.
# pull_request_target so it arms even when the head branch omits this file. SAFE: never
# checks out/executes PR head code — only calls gh pr merge --auto.
name: Auto-arm auto-merge
on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]
permissions:
  contents: write
  pull-requests: write
jobs:
  arm:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Arm rebase auto-merge (squash fallback)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          gh pr merge "$PR" --repo "$REPO" --auto --rebase || gh pr merge "$PR" --repo "$REPO" --auto --squash
